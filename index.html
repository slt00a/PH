<!--
  ============================================================
  PARKHILL 360° VIEWER  —  responsive scene navigation
  ============================================================

  SETUP:
    - Save this file as index.html
    - Put all panorama .jpg files and the logo .png in the SAME folder
    - Edit the SCENES list and LOGO below to match your filenames
    - Upload the folder to your host (GitHub Pages / Netlify) and open the URL

  NOTE: must be opened over http/https (a host or local server),
  not by double-clicking the file, or the images won't load.
  ============================================================
-->
<script>
  const SCENES = [
    { label: "Airlines",     file: "AIRLINES_01.jpg" },
    { label: "Bridge",       file: "BRIDGE_01.jpg" },
    { label: "Car Rentals",  file: "CAR_RENTALS_01.jpg" },
    { label: "Holding 1",    file: "HOLDING_01.jpg" },
    { label: "Holding 2",    file: "HOLDING_02.jpg" },
    { label: "Mezzanine 1",  file: "MEZZANINE_01.jpg" },
    { label: "Mezzanine 2",  file: "MEZZANINE_02.jpg" },
    { label: "Mezzanine 3",  file: "MEZZANINE_03.jpg" }
  ];

  const LOGO = "1 - Parkhill - Red.png";
</script>

<div id="app">
  <div id="viewer"></div>
  <div id="watermark-layer"></div>

  <div id="loader">
    <div class="spinner"></div>
    <p id="loader-text">Loading…</p>
    <div id="progress-wrap"><div id="progress-bar"></div></div>
  </div>

  <!-- Navigation -->
  <div id="nav">
    <button id="menu-btn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <div id="nav-panel">
      <div id="nav-title">Scenes</div>
      <div id="scene-list"></div>
    </div>
  </div>
  <div id="nav-backdrop"></div>

  <div id="hint-bar">Drag to look around · Scroll to zoom</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
  const viewer = document.getElementById('viewer');
  const wmLayer = document.getElementById('watermark-layer');
  const hintBar = document.getElementById('hint-bar');
  const loader = document.getElementById('loader');
  const loaderText = document.getElementById('loader-text');
  const progressWrap = document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');
  const sceneList = document.getElementById('scene-list');
  const nav = document.getElementById('nav');
  const menuBtn = document.getElementById('menu-btn');
  const backdrop = document.getElementById('nav-backdrop');

  let scene, camera, renderer, mesh;
  let lon = 0, lat = 0, targetLon = 0, targetLat = 0;
  let fov = 75;
  let isDragging = false;
  let pointerX = 0, pointerY = 0, downLon = 0, downLat = 0;
  let currentIndex = -1;
  let availableScenes = [];   // only scenes whose image exists on the server

  function init() {
    scene = new THREE.Scene();
    const w = viewer.clientWidth || window.innerWidth;
    const h = viewer.clientHeight || window.innerHeight;
    camera = new THREE.PerspectiveCamera(fov, w / h, 1, 1100);

    const geo = new THREE.SphereGeometry(500, 60, 40);
    geo.scale(-1, 1, 1);
    mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x111418 }));
    scene.add(mesh);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(w, h);
    viewer.appendChild(renderer.domElement);

    bindEvents();
    onResize();
    animate();
    requestAnimationFrame(onResize);
    window.addEventListener('load', onResize);
    setTimeout(onResize, 200);

    addLogo();
    checkScenesThenBuild();
  }

  // Verify each scene's image exists before adding it to the menu
  function checkScenesThenBuild() {
    loaderText.textContent = 'Checking scenes…';
    loader.style.display = 'flex';

    const checks = SCENES.map(function (s) {
      return new Promise(function (resolve) {
        const probe = new Image();
        probe.onload = function () { resolve({ scene: s, ok: true }); };
        probe.onerror = function () { resolve({ scene: s, ok: false }); };
        probe.src = s.file;
      });
    });

    Promise.all(checks).then(function (results) {
      availableScenes = results.filter(function (r) { return r.ok; }).map(function (r) { return r.scene; });
      const missing = results.filter(function (r) { return !r.ok; }).map(function (r) { return r.scene.file; });
      if (missing.length) console.warn('Skipped missing images:', missing);

      buildSceneList();

      if (availableScenes.length) {
        loadScene(0);
      } else {
        loader.querySelector('.spinner').style.display = 'none';
        loaderText.textContent = 'No scene images found. Check that the .jpg files are in the same folder.';
        hintBar.style.display = 'none';
      }
    });
  }

  function buildSceneList() {
    sceneList.innerHTML = '';
    availableScenes.forEach(function (s, i) {
      const b = document.createElement('button');
      b.className = 'scene-btn';
      b.textContent = s.label;
      b.addEventListener('click', function () {
        if (i !== currentIndex) loadScene(i);
        closeMenu();
      });
      sceneList.appendChild(b);
    });
  }

  function setActiveButton(i) {
    sceneList.querySelectorAll('.scene-btn').forEach(function (b, idx) {
      b.classList.toggle('active', idx === i);
    });
  }

  function addLogo() {
    if (!LOGO) return;
    const img = document.createElement('img');
    img.className = 'wm-img';
    img.src = LOGO;
    img.onerror = function () { this.style.display = 'none'; };
    wmLayer.appendChild(img);
  }

  function loadScene(i) {
    const s = availableScenes[i];
    loader.style.display = 'flex';
    loaderText.textContent = 'Loading ' + s.label + '…';
    progressBar.style.width = '0%';
    progressWrap.style.visibility = 'hidden';
    loader.querySelector('.spinner').style.display = '';

    new THREE.TextureLoader().load(
      s.file,
      function (texture) {
        texture.minFilter = THREE.LinearFilter;
        mesh.material.map = texture;
        mesh.material.color.set(0xffffff);
        mesh.material.needsUpdate = true;
        loader.style.display = 'none';
        hintBar.style.display = '';
        currentIndex = i;
        setActiveButton(i);
      },
      function (xhr) {
        if (xhr.lengthComputable) {
          progressWrap.style.visibility = 'visible';
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          progressBar.style.width = pct + '%';
          loaderText.textContent = 'Loading ' + s.label + '… ' + pct + '%';
        }
      },
      function () {
        loaderText.textContent = 'Could not load "' + s.file + '".';
        loader.querySelector('.spinner').style.display = 'none';
        progressWrap.style.visibility = 'hidden';
      }
    );
  }

  // ---------- Menu open/close (mobile) ----------
  function openMenu() { nav.classList.add('open'); backdrop.classList.add('show'); }
  function closeMenu() { nav.classList.remove('open'); backdrop.classList.remove('show'); }
  menuBtn.addEventListener('click', function () {
    nav.classList.contains('open') ? closeMenu() : openMenu();
  });
  backdrop.addEventListener('click', closeMenu);

  // ---------- Interaction ----------
  function bindEvents() {
    const el = renderer.domElement;
    el.addEventListener('pointerdown', function (e) {
      isDragging = true;
      pointerX = e.clientX; pointerY = e.clientY;
      downLon = targetLon; downLat = targetLat;
      el.setPointerCapture(e.pointerId);
      hintBar.classList.add('fade');
    });
    el.addEventListener('pointermove', function (e) {
      if (!isDragging) return;
      targetLon = downLon - (e.clientX - pointerX) * 0.12 * (fov / 75);
      targetLat = downLat + (e.clientY - pointerY) * 0.12 * (fov / 75);
      targetLat = Math.max(-85, Math.min(85, targetLat));
    });
    el.addEventListener('pointerup', function () { isDragging = false; });
    el.addEventListener('pointerleave', function () { isDragging = false; });
    el.addEventListener('wheel', function (e) {
      e.preventDefault();
      fov = Math.max(25, Math.min(95, fov + e.deltaY * 0.05));
      camera.fov = fov; camera.updateProjectionMatrix();
    }, { passive: false });

    el.addEventListener('touchmove', function (e) { e.preventDefault(); }, { passive: false });
    document.body.addEventListener('touchmove', function (e) {
      if (e.target.closest('#nav-panel')) return; // allow scrolling inside the menu
      e.preventDefault();
    }, { passive: false });

    window.addEventListener('resize', onResize);
  }

  function onResize() {
    if (!renderer) return;
    const w = viewer.clientWidth || window.innerWidth;
    const h = viewer.clientHeight || window.innerHeight;
    if (w === 0 || h === 0) return;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }

  function animate() {
    requestAnimationFrame(animate);
    lon += (targetLon - lon) * 0.1;
    lat += (targetLat - lat) * 0.1;
    const phi = THREE.MathUtils.degToRad(90 - lat);
    const theta = THREE.MathUtils.degToRad(lon);
    camera.lookAt(new THREE.Vector3(
      500 * Math.sin(phi) * Math.cos(theta),
      500 * Math.cos(phi),
      500 * Math.sin(phi) * Math.sin(theta)
    ));
    renderer.render(scene, camera);
  }

  init();
})();
</script>

<style>

    height: 100%; overflow: hidden; position: fixed; width: 100%;
    overscroll-behavior: none; touch-action: none; -webkit-touch-callout: none;

  @keyframes spin { to { transform: rotate(360deg); } }
  #progress-wrap { width: 220px; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.12); overflow: hidden; visibility: hidden; }
  #progress-bar { height: 100%; width: 0%; background: #C8102E; transition: width 0.15s; }

  /* ---------- Navigation (hamburger at all sizes) ---------- */
  #nav {

  }

  /* Slide-down menu panel */
  #nav-panel {

  /* Hamburger morphs into an X when open */
